<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Page Not Found — PickMovieTonight</title>
  <meta name="description" content="This page could not be found. Return to PickMovieTonight and get a movie recommendation for tonight.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#111111">

  <link rel="canonical" href="https://pickmovietonight.com/404.html">

  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: rgba(255,255,255,0.08);
      --accent: #8b5cf6;
      --accent-2: #3b82f6;
      --shadow: 0 24px 70px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(139,92,246,0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    /* Accessible keyboard focus ring */
    :focus-visible {
      outline: 3px solid #8b5cf6;
      outline-offset: 3px;
      border-radius: 12px;
    }

    /* Slightly stronger focus for buttons/interactive elements */
    button:focus-visible,
    a:focus-visible,
    .choice-card:focus-visible {
      box-shadow:
        0 0 0 3px rgba(139, 92, 246, 0.35),
        0 0 0 6px rgba(59, 130, 246, 0.18);
    }

    .card {
      width: 100%;
      max-width: 720px;
      border-radius: 30px;
      padding: 34px 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .logo {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-size: 28px;
    }

    .eyebrow {
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c4b5fd;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.04;
    }

    p {
      margin: 0 auto;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }

    .actions {
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 16px;
      padding: 14px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      transition: transform 0.14s ease;
    }

    a:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🎞️</div>
    <div class="eyebrow">404 · Page not found</div>
    <h1>This reel got lost.</h1>
    <p>
      The page you’re looking for doesn’t exist, but the movie picker is ready.
      Head back home and let PickMovieTonight find something worth watching.
    </p>
    <div class="actions">
      <a href="/">Pick a movie</a>
    </div>
  </main>
</body>
</html>
